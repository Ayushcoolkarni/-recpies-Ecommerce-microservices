spring.application.name=payment-service
server.port=8085

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/paymentDB
spring.datasource.username=postgres
spring.datasource.password=Ayush@0943
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Kafka — FIX: use internal Docker hostname (was localhost:9092)
spring.kafka.bootstrap-servers=kafka:29092

# Producer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false
# FIX: retries on transient broker unavailability
spring.kafka.producer.retries=3
spring.kafka.producer.acks=1

stripe.currency=INR
