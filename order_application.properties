spring.application.name=order-service
server.port=8083

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/orderServiceDB
spring.datasource.username=postgres
spring.datasource.password=Ayush@0943
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Kafka — FIX: use internal Docker hostname, not localhost
spring.kafka.bootstrap-servers=kafka:29092

# Producer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false
# FIX: retries on transient broker issues
spring.kafka.producer.retries=3
spring.kafka.producer.acks=1

# Consumer
spring.kafka.consumer.group-id=order-service-group
spring.kafka.consumer.auto-offset-reset=earliest
# FIX: manual ack so messages aren't lost if processing fails
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.add.type.headers=false
# FIX: ack mode must be MANUAL to match enable-auto-commit=false
spring.kafka.listener.ack-mode=MANUAL_IMMEDIATE
# Concurrency matches partition count (3 partitions per topic)
spring.kafka.listener.concurrency=3
