networks:
  ecom-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  zookeeper-data:
  kafka-data:

services:

  postgres:
    image: postgres:16-alpine
    container_name: ecom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Ayush@0943
      POSTGRES_MULTIPLE_DATABASES: userDB,orderServiceDB,inventoryDB,paymentDB,recipeDB,adminDB
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    ports:
      - "5432:5432"
    networks:
      - ecom-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ecom-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - ecom-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: ecom-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    ports:
      - "2181:2181"
    networks:
      - ecom-net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: ecom-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    ports:
      - "9092:9092"
    networks:
      - ecom-net

  service-registry:
    build:
      context: ./service-registry
      dockerfile: Dockerfile
    container_name: ecom-service-registry
    restart: unless-stopped
    ports:
      - "8761:8761"
    networks:
      - ecom-net
    environment:
      - SERVER_PORT=8761

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: ecom-user-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      service-registry:
        condition: service_started
    ports:
      - "8084:8084"
    networks:
      - ecom-net
    environment:
      - SERVER_PORT=8084
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/userDB
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=Ayush@0943
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true

  recipe-service:
    build:
      context: ./recipe-service
      dockerfile: Dockerfile
    container_name: ecom-recipe-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      service-registry:
        condition: service_started
    ports:
      - "8081:8081"
    networks:
      - ecom-net
    environment:
      - SERVER_PORT=8081
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/recipeDB
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=Ayush@0943
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true

  inventory-service:
    build:
      context: ./inventory-service/inventory-service
      dockerfile: Dockerfile
    container_name: ecom-inventory-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      service-registry:
        condition: service_started
      zookeeper:
        condition: service_started
      kafka:
        condition: service_started
    ports:
      - "8082:8082"
    networks:
      - ecom-net
    environment:
      - SERVER_PORT=8082
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/inventoryDB
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=Ayush@0943
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
      - EUREKA_INSTANCE_HOSTNAME=ecom-inventory-service

  order-service:
    build:
      context: ./order-service/order-service
      dockerfile: Dockerfile
    container_name: ecom-order-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      service-registry:
        condition: service_started
      zookeeper:
        condition: service_started
      kafka:
        condition: service_started
    ports:
      - "8083:8083"
    networks:
      - ecom-net
    environment:
      - SERVER_PORT=8083
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/orderServiceDB
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=Ayush@0943
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: ecom-payment-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      service-registry:
        condition: service_started
    ports:
      - "8085:8085"
    networks:
      - ecom-net
    environment:
      - SERVER_PORT=8085
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/paymentDB
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=Ayush@0943
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true

  notification-service:
    build:
      context: ./notification-service/notification-service
      dockerfile: Dockerfile
    container_name: ecom-notification-service
    restart: unless-stopped
    depends_on:
      service-registry:
        condition: service_started
      zookeeper:
        condition: service_started
      kafka:
        condition: service_started
    ports:
      - "8086:8086"
    networks:
      - ecom-net
    environment:
      - SERVER_PORT=8086
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
      - SPRING_MAIL_USERNAME=${MAIL_USERNAME}
      - SPRING_MAIL_PASSWORD=${MAIL_PASSWORD}
      - NOTIFICATION_MAIL_FROM=${MAIL_FROM}

  admin-service:
    build:
      context: ./admin-service
      dockerfile: Dockerfile
    container_name: ecom-admin-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      service-registry:
        condition: service_started
    ports:
      - "8087:8087"
    networks:
      - ecom-net
    environment:
      - SERVER_PORT=8087
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/adminDB
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=Ayush@0943
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: ecom-api-gateway
    restart: unless-stopped
    depends_on:
      service-registry:
        condition: service_started
    ports:
      - "8080:8080"
    networks:
      - ecom-net
    environment:
      - SERVER_PORT=8080
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
      - JWT_SECRET=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970